name: Update Economic Data

on:
  schedule:
    # Every 3 days at 06:00 UTC (15:00 KST)
    - cron: '0 6 */3 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run data updater
        env:
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
        run: npx tsx scripts/update-data.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/lib/data.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data.ts
          git commit -m "chore: auto-update economic data $(date +%Y-%m-%d)"
          git push
